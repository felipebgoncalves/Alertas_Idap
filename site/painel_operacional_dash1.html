<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDAP | Painel Operacional</title>
  <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body>
  <div class="app-shell">
    <main class="dashboard-grid">
      <aside class="left-column">
        <section class="brand-card">
          <div class="brand-logo-wrap">
            <img
              src="assets/idap-logo.png"
              alt="IDAP"
              class="brand-logo"
              onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
            />
            <div class="brand-fallback" style="display:none;">IDAP</div>
          </div>
        </section>

        <section class="metric-stack">
          <article class="metric-card metric-blue">
            <div class="metric-label">Últimas 24h</div>
            <div id="card-24h" class="metric-value">0</div>
          </article>

          <article class="metric-card metric-green">
            <div class="metric-label">Alertas Vigentes</div>
            <div id="card-vigentes" class="metric-value">0</div>
          </article>

          <article class="metric-card metric-orange">
            <div class="metric-label">Emissores</div>
            <div id="card-autoridades" class="metric-value">0</div>
          </article>

          <article class="metric-card metric-purple">
            <div class="metric-label">Tipos de Evento</div>
            <div id="card-tipos-evento" class="metric-value">0</div>
          </article>
        </section>

        <section class="panel-card severity-panel severity-panel-compact">
          <div class="panel-head severity-head compact">
            <h2>Níveis</h2>
          </div>
          <div id="severity-breakdown" class="severity-breakdown"></div>
        </section>
      </aside>

      <section class="center-column">
        <section class="panel-card map-panel">
          <div class="panel-head">
            <h2>Distribuição Territorial</h2>
          </div>
          <div id="mapa-uf" class="map-holder"></div>
        </section>

        <section class="panel-card recent-panel recent-panel-wide">
          <div class="panel-head compact">
            <h2>Últimos Alertas</h2>
          </div>
          <div id="ultimos-alertas" class="recent-list recent-list-wide"></div>
        </section>

        <section class="panel-card hourly-panel">
          <div class="panel-head compact">
            <h2>Alertas nas Últimas 24h</h2>
          </div>
          <div id="hourly-breakdown" class="hourly-breakdown"></div>
        </section>
      </section>

      <aside class="right-column">
        <section class="panel-card top-panel">
          <div class="panel-head compact">
            <h2>Emissores</h2>
          </div>
          <div id="top5-autoridades" class="top-list"></div>
        </section>

        
        <section class="panel-card event-panel">
          <div class="panel-head compact">
            <div class="event-head">
              <h2>Categoria de Evento</h2>
              
            </div>
          </div>
          <div id="event-breakdown" class="event-breakdown"></div>
        </section>
      </aside>
    </main>

    <footer class="footer-bar">
      <div class="footer-left">
        <span class="footer-item">Fonte: IDAP - CISDA/CGMA/DPS/SEDEC</span>
      </div>
      <div class="footer-right">
        <span class="footer-item">Atualizado em: <strong id="meta-atualizado">--/--/---- --:--:--</strong></span>
        <span class="footer-item">Próxima atualização em: <strong id="refresh-countdown">05:00</strong></span>
      </div>
    </footer>
  </div>

  <script src="assets/js/dashboard.js"></script>
</body>
</html>
