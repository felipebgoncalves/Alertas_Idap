<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arquivos Gerados | IDAP ES</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;

    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    h1 {

    }

      color: #cbd5e1;
      line-height: 1.5;
      margin: 0 0 24px;
    }

    .lista {
      display: grid;
      gap: 12px;
    }

      display: block;
      padding: 14px 16px;

      color: #e5e7eb;

    }

    a:hover {
      background: #1e293b;
    }

    .acoes {

      flex-wrap: wrap;

<body>

    <p>Links diretos para os artefatos publicados no site após a execução mais recente.</p>

    <nav class="lista">

      <a href="imagens/grafico_alertas_por_hora_24h.png" target="_blank" rel="noopener noreferrer">Gráfico de alertas por hora</a>
