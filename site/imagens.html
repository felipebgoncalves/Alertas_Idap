<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imagens Geradas | IDAP ES</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }

    .lista {
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      padding: 14px 16px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #111827;
      color: #e5e7eb;
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      background: #1e293b;
    }

    .botao {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #2563eb;
      color: white;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      min-height: 40px;
      text-align: center;
    }

    .acoes {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex: 1 1 320px;
    }

  </style>
</head>
<body>
  <main>
    <h1>Imagens Geradas</h1>
    <nav class="lista">
      <a href="imagens/grafico_alertas_por_hora_24h.png" target="_blank" rel="noopener noreferrer">Gráfico de alertas por hora</a>
      <a href="imagens/mapa_alertas_todos.png" target="_blank" rel="noopener noreferrer">Mapa de todos os alertas</a>
      <a href="imagens/mapa_alertas_chuva_temp_inund.png" target="_blank" rel="noopener noreferrer">Mapa de chuva, tempestade e inundação</a>
      <a href="imagens/mapa_alertas_deslizamento.png" target="_blank" rel="noopener noreferrer">Mapa de deslizamentos</a>
      <a href="imagens/mapa_alertas_outros.png" target="_blank" rel="noopener noreferrer">Mapa de outros alertas</a>
    </nav>
  </main>
  
  <div class="acoes">
    <a class="botao" href="./index.html" target="_blank" rel="noopener noreferrer">Voltar</a>
  </div>
</body>
</html>
