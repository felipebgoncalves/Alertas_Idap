name: IDAP Daily Maps + Pages

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Criar pastas necessárias
        run: |
          mkdir -p .cache out site/imagens site/data site/assets site/assets/flags/municipios site/assets/flags/estados
          [ -f .cache/state.json ] || echo "{}" > .cache/state.json
          [ -f .cache/historico_alertas.json ] || echo "[]" > .cache/historico_alertas.json

      - name: Run daily maps
        env:
          TZ: "America/Sao_Paulo"
          RSS_URL: "https://idapfile.mdr.gov.br/idap/api/rss/cap"
          UF_GEOJSON_PATH: "resources/geojs-es.json"
          TARGET_SENDER_NAME: "Defesa Civil Estadual do Espírito Santo"
          LOGO_PATH: "resources/Logo da CEPDEC.png"
          OUT_DIR: "out"
          STATE_PATH: ".cache/state.json"
          HISTORY_PATH: ".cache/historico_alertas.json"
          WINDOW_HOURS: "24"
          RETENTION_HOURS: "72"
          MAX_ITEMS: ""
        run: |
          python scripts/idap_daily_maps.py

      - name: Localizar pasta mais recente de saída
        id: localizar_saida
        run: |
          ULTIMA_PASTA=$(ls -dt out/run_* 2>/dev/null | head -n 1)
          echo "pasta_saida=$ULTIMA_PASTA" >> $GITHUB_OUTPUT

      - name: Copiar imagens geradas para o site
        run: |
          PASTA="${{ steps.localizar_saida.outputs.pasta_saida }}"
          cp -f "$PASTA"/*.png site/imagens/ || true

      - name: Gerar arquivo de última atualização
        run: |
          python - << 'PY'
          import json
          from datetime import datetime, timezone
          with open("site/ultima_atualizacao.json","w",encoding="utf-8") as f:
              json.dump({"gerado_em": datetime.now(timezone.utc).isoformat()}, f)
          PY

      - name: Gerar dados do dashboard original
        env:
          OUT_DIR: "out"
          SITE_DIR: "site"
          UF_GEOJSON_PATH: "resources/geojs-es.json"
          DASHBOARD_GEOJSON_TARGET: "site/data/geojs-es.json"
          TARGET_SENDER_NAME: "Defesa Civil Estadual do Espírito Santo"
        run: |
          python scripts/build_dashboard_data.py

      - name: Gerar dados do dashboard2
        env:
          HISTORY_PATH: ".cache/historico_alertas.json"
          SITE_DIR: "site"
          WINDOW_HOURS: "24"
          UF_GEOJSON_PATH: "resources/geojs-es.json"
          DASHBOARD_GEOJSON_TARGET: "site/data/geojs-es.json"
          TARGET_SENDER_NAME: "Defesa Civil Estadual do Espírito Santo"
          FLAG_DOWNLOAD_ENABLED: "0"
        run: |
          python scripts/build_dash2.py

      - name: Validar arquivos mínimos do site
        run: |
          test -f site/index.html
          test -f site/dashboard.html
          test -f site/dashboard_data.json
          test -f site/dashboard_data2.json

      - name: Setup Pages
        if: ${{ github.actor != 'nektos/act' }}
        uses: actions/configure-pages@v5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: idap_daily_outputs
          path: |
            out/
            .cache/state.json
            .cache/historico_alertas.json
            site/dashboard_data.json
            site/dashboard_data2.json
          retention-days: 7

      - name: Upload do artifact do Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      - name: Commit history/state
        if: ${{ github.actor != 'nektos/act' && always() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cache/state.json .cache/historico_alertas.json site/dashboard_data.json site/dashboard_data2.json site/data/geojs-es.json site/ultima_atualizacao.json site/imagens/*.png

          if git diff --cached --quiet; then
            echo "Sem alterações"
            exit 0
          fi

          git commit -m "Atualiza dashboards IDAP [skip ci]"
          git push

  deploy:
    if: ${{ github.actor != 'nektos/act' }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy no GitHub Pages
        uses: actions/deploy-pages@v4